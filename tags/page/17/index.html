<script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>


<script>
(function () {
  var panel     = document.getElementById('nav-search-panel');
  var toggleBtn = document.getElementById('search-toggle');
  var input     = document.getElementById('nav-search-input');
  var results   = document.getElementById('nav-search-results');
  var emptyMsg  = document.getElementById('nav-search-empty');
  if (!panel || !toggleBtn) return;

  var fuse, debounceTimer, indexLoaded = false;

  function loadIndex() {
    if (indexLoaded) return;
    indexLoaded = true;
    fetch('/index.json')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        fuse = new Fuse(data, {
          keys: [
            { name: 'title',   weight: 2   },
            { name: 'tags',    weight: 1.5 },
            { name: 'summary', weight: 1   }
          ],
          threshold: 0.2,
          minMatchCharLength: 3,
          ignoreLocation: true
        });
      });
  }

  toggleBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    var opening = !panel.classList.contains('open');
    panel.classList.toggle('open', opening);
    if (opening) { loadIndex(); $('.navbar-collapse').collapse('hide'); setTimeout(function () { input.focus(); }, 50); }
    else { clear(); }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && panel.classList.contains('open')) {
      panel.classList.remove('open');
      clear();
    }
  });

  document.addEventListener('click', function (e) {
    if (!panel.contains(e.target) && e.target !== toggleBtn) {
      panel.classList.remove('open');
      clear();
    }
  });

  input.addEventListener('input', function () {
    clearTimeout(debounceTimer);
    var query = input.value.trim();
    if (query.length < 3) { clear(); return; }
    debounceTimer = setTimeout(function () { runSearch(query); }, 750);
  });

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function highlight(str, query) {
    if (!str || !query) return esc(str);
    var re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    return esc(str).replace(re, function (m) { return '<mark>' + m + '</mark>'; });
  }

  function clear() {
    results.innerHTML = '';
    emptyMsg.style.display = 'none';
  }

  function runSearch(query) {
    clear();
    if (!fuse) return;
    var hits = fuse.search(query);
    if (!hits.length) { emptyMsg.style.display = ''; return; }
    hits.forEach(function (r) {
      var item = r.item;
      var li = document.createElement('li');
      var tags = (item.tags || []).map(function (t) {
        return '<span class="posts-tag" style="font-size:1.4rem;padding:4px 10px;border-radius:3px;">' + highlight(t, query) + '</span>';
      }).join('');
      li.innerHTML =
        '<a href="' + esc(item.url) + '" style="font-size:1.8rem;font-weight:600;">' + highlight(item.title, query) + '</a>' +
        '<div style="font-size:1.4rem;color:#888;margin:4px 0 8px;">' + esc(item.date) + '</div>' +
        (tags ? '<div style="margin-bottom:8px;">' + tags + '</div>' : '') +
        (item.summary ? '<div style="font-size:1.5rem;color:var(--text,#333);">' + highlight(item.summary, query) + '</div>' : '');
      results.appendChild(li);
    });
  }
})();
</script>

<script>
    (function() {
        var btn = document.getElementById('theme-toggle');
        if (!btn) return;

        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });

        
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!localStorage.getItem('theme')) {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            }
        });
    })();
</script>
